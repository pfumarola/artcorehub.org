name: Build and deploy Nuxt via SFTP

on:
  push:
    branches: ["release"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE }}
      NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
      NUXT_PUBLIC_PAYPAL_DONATE_URL: ${{ vars.NUXT_PUBLIC_PAYPAL_DONATE_URL }}
      NUXT_PUBLIC_INSTAGRAM_URL: ${{ vars.NUXT_PUBLIC_INSTAGRAM_URL }}
      NUXT_PUBLIC_COWORKING_SPOTS_LEFT: ${{ vars.NUXT_PUBLIC_COWORKING_SPOTS_LEFT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .output
            node_modules/.cache/nuxt
          key: ${{ runner.os }}-nuxt-ssg-v2-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'nuxt.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-ssg-v2-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Validate required build variables
        run: |
          required_vars=(
            "MAINTENANCE_MODE"
            "NUXT_PUBLIC_SITE_URL"
            "NUXT_PUBLIC_PAYPAL_DONATE_URL"
            "NUXT_PUBLIC_INSTAGRAM_URL"
            "NUXT_PUBLIC_COWORKING_SPOTS_LEFT"
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub Variable: $var_name"
              exit 1
            fi
          done
      - name: Create .env for Nuxt build
        run: |
          cat <<EOF > .env
          MAINTENANCE_MODE=${MAINTENANCE_MODE}
          NUXT_PUBLIC_SITE_URL=${NUXT_PUBLIC_SITE_URL}
          NUXT_PUBLIC_PAYPAL_DONATE_URL=${NUXT_PUBLIC_PAYPAL_DONATE_URL}
          NUXT_PUBLIC_INSTAGRAM_URL=${NUXT_PUBLIC_INSTAGRAM_URL}
          NUXT_PUBLIC_COWORKING_SPOTS_LEFT=${NUXT_PUBLIC_COWORKING_SPOTS_LEFT}
          EOF
      - name: Static HTML export with Nuxt
        run: ${{ steps.detect-package-manager.outputs.manager }} run generate
      - name: Validate SFTP configuration
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          required_sftp_vars=(
            "SFTP_SERVER"
            "SFTP_USERNAME"
            "SFTP_PASSWORD"
            "SFTP_REMOTE_DIR"
          )

          for var_name in "${required_sftp_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub Secret: $var_name"
              exit 1
            fi
          done
      - name: Deploy to SFTP server
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp <<EOF
          set cmd:fail-exit yes
          set sftp:auto-confirm yes
          open "sftp://${SFTP_SERVER}:${SFTP_PORT}"
          user "${SFTP_USERNAME}" "${SFTP_PASSWORD}"
          cd "${SFTP_REMOTE_DIR}"
          mirror -R --delete --verbose "./dist/" "."
          bye
          EOF
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
          SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
