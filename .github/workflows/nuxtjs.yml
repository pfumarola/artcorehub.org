# Build SSG (Static Site Generation) con Nuxt: `nuxt generate` + Nitro preset static → `.output/public`
# Riferimento: https://nuxt.com/docs/getting-started/deployment#static-hosting
#
name: Deploy Nuxt site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job (SSG: prerender di tutte le route in HTML statici)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      # Abilita GitHub Pages e esporta metadati. Non usare static_site_generator: nuxt: è pensato per Nuxt 2
      # (router.base + target static) e non è compatibile con Nuxt 3/4; app.baseURL va impostato a mano se servisse un sottopath.
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Restore Nuxt SSG cache
        uses: actions/cache@v4
        with:
          path: |
            .output
            node_modules/.cache/nuxt
          key: ${{ runner.os }}-nuxt-ssg-v2-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'nuxt.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-ssg-v2-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: SSG — nuxt generate
        env:
          # Pages progetto: asset e router sotto /nome-repo/ (altrimenti CSS/JS puntano a /_nuxt e danno 404)
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
          NUXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: ${{ steps.detect-package-manager.outputs.manager }} run generate
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
